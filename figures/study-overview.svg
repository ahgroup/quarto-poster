<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Study overview placeholder</title>
  <desc id="desc">Generic icons showing groups, measurements, and outcomes.</desc>
  <rect width="1600" height="520" fill="#ffffff"/>
  <text x="60" y="55" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#111111">Example study flow</text>
  <defs>
    <g id="person"><circle cx="0" cy="-55" r="28" fill="#2F5D75"/><rect x="-28" y="-25" width="56" height="95" rx="18" fill="#2F5D75"/><rect x="-42" y="0" width="20" height="80" rx="9" fill="#2F5D75"/><rect x="22" y="0" width="20" height="80" rx="9" fill="#2F5D75"/><rect x="-22" y="60" width="18" height="92" rx="8" fill="#2F5D75"/><rect x="4" y="60" width="18" height="92" rx="8" fill="#2F5D75"/></g>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#BA0C2F"/></marker>
  </defs>
  <g transform="translate(150,230)"><use href="#person"/><text x="0" y="195" text-anchor="middle" font-family="Arial" font-size="30">Baseline</text></g>
  <g transform="translate(420,230)"><use href="#person"/><text x="0" y="195" text-anchor="middle" font-family="Arial" font-size="30">Group A</text></g>
  <g transform="translate(690,230)"><use href="#person"/><text x="0" y="195" text-anchor="middle" font-family="Arial" font-size="30">Group B</text></g>
  <g transform="translate(960,230)"><use href="#person"/><text x="0" y="195" text-anchor="middle" font-family="Arial" font-size="30">Group C</text></g>
  <g transform="translate(1240,165)"><rect x="-70" y="-40" width="240" height="180" rx="18" fill="#F5F5F5" stroke="#BA0C2F" stroke-width="5"/><path d="M-25 70 L25 30 L75 85 L145 -10" fill="none" stroke="#2F5D75" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/><text x="50" y="195" text-anchor="middle" font-family="Arial" font-size="30">Outcome</text></g>
  <line x1="230" y1="230" x2="340" y2="230" stroke="#BA0C2F" stroke-width="8" marker-end="url(#arrow)"/>
  <line x1="500" y1="230" x2="610" y2="230" stroke="#BA0C2F" stroke-width="8" marker-end="url(#arrow)"/>
  <line x1="770" y1="230" x2="880" y2="230" stroke="#BA0C2F" stroke-width="8" marker-end="url(#arrow)"/>
  <line x1="1045" y1="230" x2="1165" y2="230" stroke="#BA0C2F" stroke-width="8" marker-end="url(#arrow)"/>
</svg>
