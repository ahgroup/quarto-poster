<svg xmlns="http://www.w3.org/2000/svg" width="4800" height="620" viewBox="0 0 4800 620" role="img" aria-labelledby="title desc">
  <title id="title">Poster header banner placeholder</title>
  <desc id="desc">A clean white scientific poster header with an institutional logo placeholder on the left and an accent rule at the bottom.</desc>
  <rect width="4800" height="620" fill="#ffffff"/>
  <rect x="80" y="90" width="820" height="360" rx="18" fill="#ffffff" stroke="#dddddd" stroke-width="4"/>
  <g transform="translate(130,130)">
    <rect width="230" height="260" fill="#111111"/>
    <path d="M70 215 V95 C70 40 160 40 160 95 V215" fill="none" stroke="#ffffff" stroke-width="18"/>
    <path d="M52 215 H178" stroke="#ffffff" stroke-width="18"/>
    <circle cx="115" cy="226" r="38" fill="#BA0C2F"/>
    <text x="115" y="240" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#ffffff">1785</text>
  </g>
  <text x="410" y="215" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="700" letter-spacing="10" fill="#111111">UNIVERSITY</text>
  <text x="410" y="305" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700" fill="#BA0C2F">PLACEHOLDER</text>
  <text x="410" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#111111">Research Group or Department</text>
  <rect x="110" y="540" width="4580" height="26" fill="#BA0C2F"/>
</svg>
