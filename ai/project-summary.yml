# Concise AI-readable project summary.
#
# This file is for AI tools to read and write as a convenience summary. It is not
# human-facing documentation, and human users are not expected to read, write, or
# maintain it. Human-facing files such as readme.md, usage.md, and agents.md are
# authoritative if they disagree with this summary.

project:
  title: "Quarto scientific poster template"
  short_name: "quarto-poster"
  project_type: "quarto-template"
  status: "template"
  license: "MIT"
  primary_outputs:
    - "template.qmd"
    - "examples/portrait-poster.qmd"

software:
  primary_language: "Quarto"
  additional_languages:
    - "Typst"
    - "R"
  quarto_required: true
  minimum_quarto_version: "1.9.18"
  template_format: "poster-typst"
  package_management: "none by default"
  optional_r_scripts:
    - "code/make-example-figure.r"

template:
  upstream_base: "quarto-ext/typst-templates/poster"
  vendored_extension: "_extensions/poster/"
  main_template: "template.qmd"
  examples_folder: "examples/"
  figures_folder: "figures/"
  default_output: "PDF via Typst"
  supported_examples:
    - "landscape poster in template.qmd"
    - "portrait poster in examples/portrait-poster.qmd"

ai_assistance:
  allowed: true
  summary_file: "ai/project-summary.yml"
  log_file: "ai/ai-use-log.md"
  guidance_file: "agents.md"
  user_policy_file: "ai/ai-use-policy.md"
  prompt_files:
    - "ai/prompts/poster-content-review.prompt.md"
    - "ai/prompts/poster-template-maintenance.prompt.md"
  human_review_required: true
  full_chat_transcripts_required: false

verification:
  render_checks:
    - "quarto render template.qmd"
    - "quarto render examples/portrait-poster.qmd"
  git_review: "git status --short"
